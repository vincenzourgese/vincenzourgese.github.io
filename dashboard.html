<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;

    background:linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed
    );
}

.card{

    background:white;

    padding:40px;

    border-radius:20px;

    text-align:center;
}

h1{
    margin-bottom:20px;
}

.btn{

    margin-top:20px;

    padding:14px 28px;

    border:none;

    border-radius:14px;

    background:linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed
    );

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:all .25s ease;
}

.btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 12px 24px rgba(79,70,229,.3);
}

</style>
</head>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAx6IxGI8jBh8I1eGq-9HJN4GRbJ1I0O8o",
  authDomain: "vincenzo-requests.firebaseapp.com",
  projectId: "vincenzo-requests",
  storageBucket: "vincenzo-requests.firebasestorage.app",
  messagingSenderId: "1067496408724",
  appId: "1:1067496408724:web:998495fabd15665c361681",
  measurementId: "G-X7H501Q0JL"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth, (user) => {

    if(!user){

    window.location.href =
    "login.html";

}else{

    currentUser = user;

    document.getElementById(
        "userEmail"
    ).innerText =
    user.email;

}

});

window.sendRequest = async function(){

if(!currentUser){
    return;
}

const requestText =
document.getElementById(
    "request"
).value;

if(requestText.trim() === ""){
    return;
}

try{

await addDoc(
collection(db, "requests"),
{
    userEmail: currentUser.email,
    request: requestText,
    createdAt: serverTimestamp()
}
);

document.getElementById(
    "status"
).innerText =
"Richiesta inviata!";

document.getElementById(
    "request"
).value = "";

}catch(error){

document.getElementById(
    "status"
).innerText =
error.message;

}

};

document.getElementById("sendBtn")
.addEventListener("click", sendRequest);

async function sendRequest(){

if(!currentUser){
    alert("Devi essere autenticato");
    return;
}

const requestText =
document.getElementById("request").value;

if(requestText.trim() === ""){
    alert("Scrivi una richiesta");
    return;
}

try{

await addDoc(
collection(db, "requests"),
{
    userEmail: currentUser.email,
    request: requestText,
    createdAt: serverTimestamp()
}
);

window.location.href =
"thankyou.html";

}catch(error){

document.getElementById("status")
.innerText = error.message;

console.error(error);

}

}

</script>

<body>

<div class="card">

<h1>Le tue richieste</h1>

<p id="userEmail">
Caricamento...
</p>

<br>

<textarea
id="request"
placeholder="Scrivi qui la tua richiesta..."
style="
width:300px;
height:120px;
padding:12px;
border-radius:12px;
resize:none;
">
</textarea>

<br><br>

<button id="sendBtn" class="btn">
    🚀 Invia richiesta
</button>

<p id="status"></p>

</div>

</body>
</html>
