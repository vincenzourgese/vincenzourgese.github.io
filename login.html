<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Inter, Arial, sans-serif;

    background:linear-gradient(
        -45deg,
        #4f46e5,
        #7c3aed,
        #06b6d4,
        #2563eb
    );

    background-size:400% 400%;

    animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{

    width:420px;

    padding:40px;

    border-radius:32px;

    background:rgba(255,255,255,0.12);

    border:1px solid rgba(255,255,255,0.2);

    backdrop-filter:blur(20px);

    box-shadow:
        0 8px 32px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(255,255,255,0.2);

    text-align:center;
}

h2{
    color:white;
    margin-bottom:25px;
}

input{

    width:100%;

    padding:14px;

    margin-bottom:15px;

    border:none;

    border-radius:12px;
}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    color:white;

    font-size:16px;

    font-weight:600;

    background:linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed
    );

    transition:all .25s ease;
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 12px 24px rgba(79,70,229,.3);
}

#message{

    margin-top:15px;

    color:white;
}

.password-container{

    position:relative;

    width:100%;
}

.password-container input{

    width:100%;

    padding:14px;

    padding-right:50px;

    border:none;

    border-radius:12px;
}

.show-password{

    position:absolute;

    right:10px;

    top:50%;

    transform:translateY(-50%);

    border:none;

    background:none;

    cursor:pointer;

    font-size:18px;

    width:auto;

    padding:0;
}

</style>
</head>
<body>

<div class="card">

<h2>Accedi o Registrati</h2>

<input
id="email"
type="email"
placeholder="Email">

<div class="password-container">

<input
id="password"
type="password"
placeholder="Password">

<button
type="button"
class="show-password"
onclick="togglePassword()">
👁️
</button>

</div>

<button onclick="login()">
Login
</button>

<button onclick="googleLogin()">
Continua con Google
</button>

<p style="margin-top:20px;color:white;">
Non hai un account?
</p>

<a
href="register.html"
style="
display:inline-block;
margin-top:10px;
color:white;
font-weight:bold;
text-decoration:none;
">
Registrati
</a>

<div id="message"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/*
INCOLLA QUI LA CONFIGURAZIONE FIREBASE
*/

const firebaseConfig = {
  apiKey: "AIzaSyAx6IxGI8jBh8I1eGq-9HJN4GRbJ1I0O8o",
  authDomain: "vincenzo-requests.firebaseapp.com",
  projectId: "vincenzo-requests",
  storageBucket: "vincenzo-requests.firebasestorage.app",
  messagingSenderId: "1067496408724",
  appId: "1:1067496408724:web:998495fabd15665c361681",
  measurementId: "G-X7H501Q0JL"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

window.location.href =
"dashboard.html";

}catch(error){

document.getElementById("message")
.innerText =
error.message;

}

}

window.googleLogin = async function(){

try{

await signInWithPopup(
auth,
provider
);

window.location.href =
"dashboard.html";

}catch(error){

document.getElementById("message")
.innerText =
error.message;

}

}

window.togglePassword = function(){

const passwordInput =
document.getElementById("password");

if(passwordInput.type === "password"){

    passwordInput.type = "text";

}else{

    passwordInput.type = "password";

}

}

</script>

</body>
</html>
