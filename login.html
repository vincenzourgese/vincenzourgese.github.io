<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed
    );

    font-family:Arial,sans-serif;
}

.card{

    width:400px;

    padding:40px;

    border-radius:24px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(20px);

    text-align:center;
}

h2{
    color:white;
    margin-bottom:25px;
}

input{

    width:100%;

    padding:14px;

    margin-bottom:15px;

    border:none;

    border-radius:12px;
}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-weight:bold;

    margin-top:10px;
}

#message{

    margin-top:15px;

    color:white;
}

</style>
</head>
<body>

<div class="card">

<h2>Accedi o Registrati</h2>

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="register()">
Registrati
</button>

<button onclick="login()">
Login
</button>

<button onclick="googleLogin()">
Continua con Google
</button>

<div id="message"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/*
INCOLLA QUI LA CONFIGURAZIONE FIREBASE
*/

const firebaseConfig = {
  apiKey: "AIzaSyAx6IxGI8jBh8I1eGq-9HJN4GRbJ1I0O8o",
  authDomain: "vincenzo-requests.firebaseapp.com",
  projectId: "vincenzo-requests",
  storageBucket: "vincenzo-requests.firebasestorage.app",
  messagingSenderId: "1067496408724",
  appId: "1:1067496408724:web:998495fabd15665c361681",
  measurementId: "G-X7H501Q0JL"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

window.register = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

document.getElementById("message")
.innerText =
"Registrazione completata!";

}catch(error){

document.getElementById("message")
.innerText =
error.message;

}

}

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

window.location.href =
"dashboard.html";

}catch(error){

document.getElementById("message")
.innerText =
error.message;

}

}

window.googleLogin = async function(){

try{

await signInWithPopup(
auth,
provider
);

window.location.href =
"dashboard.html";

}catch(error){

document.getElementById("message")
.innerText =
error.message;

}

}

</script>

</body>
</html>
