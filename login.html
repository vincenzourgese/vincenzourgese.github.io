<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;

    background:linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed
    );
}

.card{
    width:380px;

    padding:40px;

    border-radius:24px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(20px);

    text-align:center;
}

h2{
    color:white;
    margin-bottom:25px;
}

input{
    width:100%;

    padding:14px;

    margin-bottom:15px;

    border:none;

    border-radius:12px;
}

button{
    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-weight:bold;
}

.link{
    margin-top:20px;
    color:white;
}
</style>
</head>

<body>

<div class="card">

    <h2>Accedi</h2>

    <input
        type="email"
        placeholder="Email">

    <input
        type="password"
        placeholder="Password">

    <button>Login</button>

    <div class="link">
        Non hai un account? Registrati
    </div>

</div>

</body>
</html>
